services:
  api:
    # Build
    build:
      context: .
      dockerfile: Dockerfile.nvidia_auto
    # Deploy
    environment:
      PORT: '8000'
      DO_NOT_TRACK: '1'
      API_KEY: 'abc'
      MODEL_ID: 'jinaai/jina-embeddings-v5-text-small'
    entrypoint:
      - sh
      - -c
    command:
      - |
        infinity_emb v2 \
          --port "$${PORT}" \
          --api-key "$${API_KEY}" \
          --model-id "$${MODEL_ID}"
    ports:
      - "8000:8000"
